<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text to PDF</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      padding: 40px;
      width: 100%;
      max-width: 600px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 250px;
      padding: 16px;
      border: 2px solid #e5e5e5;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: #4f46e5;
    }

    textarea::placeholder {
      color: #999;
    }

    .options {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .option-group {
      flex: 1;
      min-width: 150px;
    }

    select {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #e5e5e5;
      border-radius: 8px;
      font-size: 14px;
      background: white;
      cursor: pointer;
    }

    select:focus {
      outline: none;
      border-color: #4f46e5;
    }

    .btn-convert {
      width: 100%;
      padding: 16px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-convert:hover {
      background: #4338ca;
    }

    .btn-convert:active {
      transform: scale(0.98);
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📄 Text to PDF</h1>
      <p>Convert plain text to PDF instantly</p>
    </div>

    <div class="input-group">
      <label for="textInput">Your Text</label>
      <textarea id="textInput" placeholder="Paste or type your text here..."></textarea>
    </div>

    <div class="options">
      <div class="option-group">
        <label for="fontSize">Font Size</label>
        <select id="fontSize">
          <option value="12">Small (12px)</option>
          <option value="14" selected>Medium (14px)</option>
          <option value="18">Large (18px)</option>
          <option value="24">Extra Large (24px)</option>
        </select>
      </div>
      <div class="option-group">
        <label for="fontFamily">Font</label>
        <select id="fontFamily">
          <option value="helvetica" selected>Helvetica</option>
          <option value="times">Times New Roman</option>
          <option value="courier">Courier</option>
        </select>
      </div>
    </div>

    <button class="btn-convert" onclick="convertToPDF()">Download PDF</button>

    <p class="footer">Runs entirely in your browser. No data is uploaded.</p>
  </div>

  <script>
    const { jsPDF } = window.jspdf;

    function convertToPDF() {
      const text = document.getElementById('textInput').value;
      const fontSize = parseInt(document.getElementById('fontSize').value);
      const fontFamily = document.getElementById('fontFamily').value;

      if (!text.trim()) {
        alert('Please enter some text first!');
        return;
      }

      const doc = new jsPDF();
      
      doc.setFont(fontFamily, 'normal');
      doc.setFontSize(fontSize);
      
      const pageWidth = doc.internal.pageSize.getWidth();
      const margin = 20;
      const maxWidth = pageWidth - (margin * 2);
      const lines = doc.splitTextToSize(text, maxWidth);
      
      doc.text(lines, margin, margin + fontSize);
      doc.save('document.pdf');
    }
  </script>
</body>
</html>
